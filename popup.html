<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snoop Catcher</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;font-family:ui-monospace,Menlo,Consolas,monospace}
  body{display:grid;place-items:center;text-align:center;cursor:pointer;background:transparent}

  /* --- FACE: opaque cartoon takeover --- */
  body.face{background:radial-gradient(120% 120% at 50% 30%,#ffd23f 0%,#ff8f1f 55%,#ff5e1f 100%)}
  .face-art{width:min(46vh,340px);height:auto;animation:wobble 1.1s ease-in-out infinite}
  @keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  .banner{margin-top:14px;font-weight:700;color:#3a1a00;font-size:clamp(28px,6vw,72px);letter-spacing:.06em;text-shadow:0 2px 0 rgba(255,255,255,.35)}
  .sub{margin-top:8px;color:#6a3400;font-size:clamp(13px,2vw,20px);letter-spacing:.18em}

  /* --- DIM: darken the real screen --- */
  body.dim{background:rgba(0,0,0,0.9)}
  body.dim .msg{color:#e7edf0}

  /* --- BLUR: frost the real screen (true blur via Win11 acrylic; frosted fallback otherwise) --- */
  body.blur{background:rgba(150,160,175,0.30)}
  body.blur .frost{position:fixed;inset:0;background:rgba(220,225,235,0.45);pointer-events:none}
  body.blur .msg{color:#20242c}

  .msg{position:relative;font-size:clamp(15px,2.4vw,24px);letter-spacing:.14em;font-weight:600;display:none}
  .msg small{display:block;margin-top:10px;font-size:13px;font-weight:400;letter-spacing:.08em;opacity:.8}

  .close{position:fixed;top:18px;right:18px;width:58px;height:58px;border-radius:50%;border:none;
    background:rgba(40,40,45,.8);color:#fff;font-size:28px;font-weight:700;cursor:pointer;
    display:grid;place-items:center;z-index:5}
  .close:hover{background:#000}
  body.face .close{background:rgba(58,26,0,.88);color:#ffd23f}
  @media (prefers-reduced-motion:reduce){.face-art{animation:none}}
</style>
</head>
<body class="face">
  <div class="frost"></div>
  <button class="close" id="close" aria-label="Close">✕</button>
  <div class="content" id="content">
    <div id="faceHolder"></div>
    <div class="banner" id="banner">👀 BUSTED</div>
    <div class="sub">EYES ON YOUR OWN SCREEN</div>
  </div>
  <div class="msg" id="msg">🔒 SCREEN HIDDEN<small>tap anywhere or ✕ to dismiss</small></div>
<script>
  const sc = window.snoopcatcher;
  const content = document.getElementById('content');
  const msg = document.getElementById('msg');
  if (sc && sc.onRender) sc.onRender((data) => {
    const style = (data && data.style) || 'face';
    document.body.className = style;
    const isFace = style === 'face';
    content.style.display = isFace ? 'block' : 'none';
    msg.style.display = isFace ? 'none' : 'block';
    if (isFace) {
      if (data && data.faceSvg) {
        document.getElementById('faceHolder').innerHTML =
          data.faceSvg.replace('class="face"', 'class="face-art"');
      }
      if (data && data.banner) document.getElementById('banner').textContent = data.banner;
    }
  });
  function dismiss(){ if (sc && sc.popupDismiss) sc.popupDismiss(); }
  document.getElementById('close').addEventListener('click', (e) => { e.stopPropagation(); dismiss(); });
  document.body.addEventListener('click', dismiss);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') dismiss(); });
</script>
</body>
</html>
